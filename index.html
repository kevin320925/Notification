<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notification</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Roboto, sans-serif;
    background-color: #ffffff;
    color: #333333;
    padding: 24px 20px;
    line-height: 1.7;
  }
  .title {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 28px;
  }
  .content {
    font-size: 16px;
    text-align: left;
  }
</style>
</head>
<body>
  <div class="title">Notification</div>
  <div class="content">
    We sincerely apologize that, due to Midea Club ongoing system upgrades, your TNG redemption amount will be credited to your TNG account on 5th Jun. We apologize for any inconvenience caused and appreciate your patience and support. Thank you.
  </div>

</html>
